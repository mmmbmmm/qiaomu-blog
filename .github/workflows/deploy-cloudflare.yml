name: Deploy Cloudflare

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create Cloudflare config
        shell: bash
        run: |
          cat > wrangler.local.toml <<EOF
          name = "qiaomu-blog-opensource"
          main = "worker.ts"
          compatibility_date = "2026-04-14"
          compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

          [assets]
          directory = ".open-next/assets"
          binding = "ASSETS"

          [ai]
          binding = "WORKERS_AI"

          [[services]]
          binding = "WORKER_SELF_REFERENCE"
          service = "qiaomu-blog-opensource"

          [[d1_databases]]
          binding = "DB"
          database_name = "qiaomu-blog-db"
          database_id = "92b93a7b-7cf5-438e-aaab-93f27db80eb0"

          [[r2_buckets]]
          binding = "IMAGES"
          bucket_name = "qiaomu-blog-images"

          [[routes]]
          pattern = "blog.agisj.cn"
          custom_domain = true

          [vars]
          NEXT_PUBLIC_SITE_URL = "https://blog.agisj.cn"
          AI_BASE_URL = "${{ secrets.AI_BASE_URL }}"
          AI_MODEL = "${{ secrets.AI_MODEL }}"
          WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
          EOF

      - name: Build OpenNext worker
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx opennextjs-cloudflare build -c wrangler.local.toml --dangerouslyUseUnsupportedNextVersion

      - name: Upload OpenNext artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: open-next-worker
          path: |
            .open-next/worker.js
            .open-next/assets
          if-no-files-found: ignore

      - name: Deploy worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          OPEN_NEXT_DEPLOY: "true"
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Deploy attempt ${attempt}"
            if npx wrangler deploy .open-next/worker.js -c wrangler.local.toml --no-bundle --assets .open-next/assets; then
              exit 0
            fi
            sleep $((attempt * 60))
          done
          exit 1

      - name: Set worker secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_TOKEN_SALT: ${{ secrets.ADMIN_TOKEN_SALT }}
          AI_CONFIG_ENCRYPTION_SECRET: ${{ secrets.AI_CONFIG_ENCRYPTION_SECRET }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        shell: bash
        run: |
          printf "%s" "$ADMIN_PASSWORD" | npx wrangler secret put ADMIN_PASSWORD -c wrangler.local.toml
          printf "%s" "$ADMIN_TOKEN_SALT" | npx wrangler secret put ADMIN_TOKEN_SALT -c wrangler.local.toml
          printf "%s" "$AI_CONFIG_ENCRYPTION_SECRET" | npx wrangler secret put AI_CONFIG_ENCRYPTION_SECRET -c wrangler.local.toml
          if [ -n "$AI_API_KEY" ]; then
            printf "%s" "$AI_API_KEY" | npx wrangler secret put AI_API_KEY -c wrangler.local.toml
          fi
